# ======================================================
# TRIGGERS
# ======================================================

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

# ======================================================
# AGENT POOL
# ======================================================

pool:
  name: WindowsSelfHostedPool

# ======================================================
# VARIABLES
# ======================================================

variables:
  nodeVersion: '18.x'

# ======================================================
# STAGES
# ======================================================

stages:

# =========================
# BUILD STAGE (CI)
# =========================
- stage: Build
  displayName: Build_and_Test
  jobs:
    - job: BuildJob
      displayName: Build_Job
      steps:
        - checkout: self

        - task: UseNode@1
          displayName: Use_NodeJS
          inputs:
            version: $(nodeVersion)

        - task: CmdLine@2
          displayName: Install_Build_Test
          inputs:
            workingDirectory: $(System.DefaultWorkingDirectory)
            script: |
              npm install
              npm run build
              npm test

# =========================
# DEPLOY STAGE (CD)
# =========================
- stage: Deploy
  displayName: Deploy_to_Azure_App_Service
  dependsOn: Build
  condition: succeeded()
  jobs:
    - deployment: DeployWeb
      displayName: Deploy_Node_App
      environment: production
      strategy:
        runOnce:
          deploy:
            steps:
              - task: AzureWebApp@1
                displayName: Deploy_to_demo9081
                inputs:
                  azureSubscription: Azure-AppService-Connection
                  appName: demo9081
                  appType: webApp
                  package: $(System.DefaultWorkingDirectory)