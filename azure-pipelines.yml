# ======================================================
# TRIGGERS
# ======================================================

# Run pipeline after merge to main
trigger:
  branches:
    include:
      - main

# Run pipeline for Pull Requests to main
pr:
  branches:
    include:
      - main

# ======================================================
# AGENT POOL (SELF-HOSTED WINDOWS AGENT)
# ======================================================

pool:
  name: WindowsSelfHostedPool

# ======================================================
# VARIABLES
# ======================================================

variables:
  nodeVersion: '18.x'

# ======================================================
# STAGES
# ======================================================

stages:

# ------------------------------------------------------
# STAGE 1: BUILD & TEST (RUNS FOR PR + MAIN)
# ------------------------------------------------------
- stage: Build
  displayName: Build_and_Test
  condition: always()
  jobs:
    - job: BuildJob
      displayName: Build_Job
      steps:
        - checkout: self

        - task: NodeTool@0
          displayName: Use_NodeJS
          inputs:
            versionSpec: $(nodeVersion)

        - script: |
            npm install
            npm run build
            npm test
          displayName: Install_Build_Test

# ------------------------------------------------------
