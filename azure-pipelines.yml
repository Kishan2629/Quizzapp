
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
# =========================
# BUILD STAGE (PR + MAIN)
# =========================
- stage: Build
  displayName: Build_and_Test
  jobs:
  - job: BuildJob
    displayName: Build
    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: Install_Node

    - script: |
        npm install
        npm run build
        npm test
      displayName: Build_Test

# =========================
# DEPLOY STAGE (MAIN ONLY)
# =========================
- stage: Deploy
  displayName: Deploy_to_Azure
  dependsOn: Build
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
    )

  jobs:
  - deployment: DeployWeb
    displayName: DeployApp
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-AppService-Connection'
              appType: webApp
              appName: '<YOUR_APP_SERVICE_NAME>'
              package: '$(System.DefaultWorkingDirectory)'
