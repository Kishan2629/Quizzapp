# ======================================
# PIPELINE TRIGGERS
# ======================================

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

# ======================================
# AGENT
# ======================================

pool:
  vmImage: ubuntu-latest

# ======================================
# STAGES
# ======================================

stages:

# ---------- STAGE 1: BUILD (ALWAYS RUNS) ----------
- stage: Build
  displayName: Build_and_Test
  condition: always()
  jobs:
    - job: BuildJob
      displayName: Build_Job
      steps:
        - checkout: self

        - task: NodeTool@0
          displayName: Install_NodeJS
          inputs:
            versionSpec: '18.x'

        - script: |
            npm install
            npm run build
            npm test
          displayName: Build_and_Test_App

# ---------- STAGE 2: DEPLOY (ONLY AFTER MERGE TO MAIN) ----------
- stage: Deploy
  displayName: Deploy_to_Azure_App_Service
  dependsOn: Build
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main'),
      ne(variables['Build.Reason'], 'PullRequest')
    )

  jobs:
    - deployment: DeployWeb
      displayName: Deploy_Web_App
      environment: production
      strategy:
        runOnce:
          deploy:
            steps:
              - task: AzureWebApp@1
                displayName: Deploy_To_Azure
                inputs:
                  azureSubscription: 'Azure-AppService-Connection'
                  appType: webApp
                  appName: 'demo9081'
                  package: '$(System.DefaultWorkingDirectory)'